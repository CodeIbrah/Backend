worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging
    log_format main escape=json '{'
        '"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"request": "$request",'
        '"status": $status,'
        '"body_bytes_sent": $body_bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_response_time": "$upstream_response_time",'
        '"correlation_id": "$http_x_correlation_id",'
        '"request_id": "$request_id",'
        '"http_referer": "$http_referer",'
        '"http_user_agent": "$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=payment_limit:10m rate=3r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=2r/s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Upstreams
    upstream main {
        server main:3000;
    }

    upstream auth-service {
        server auth-service:3001;
    }

    upstream users-service {
        server users-service:3002;
    }

    upstream notifications-service {
        server notifications-service:3003;
    }

    upstream payment-service {
        server payment-service:3000;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream prometheus {
        server prometheus:9090;
    }

    upstream jaeger {
        server jaeger:16686;
    }

    # Map for correlation_id
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        "" $request_id;
    }

    server {
        listen 80;
        server_name localhost;

        # HTTPS redirect (uncomment when SSL certs are configured)
        # return 301 https://$host$request_uri;

        # Security headers
        add_header X-Request-ID $request_id always;
        add_header X-Correlation-ID $correlation_id always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # Auth service
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://auth-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Users service
        location /api/v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://users-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Payment service
        location /api/v1/payments/ {
            limit_req zone=payment_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Invoice routes
        location /api/v1/invoices/ {
            limit_req zone=payment_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Receipt routes
        location /api/v1/receipts/ {
            limit_req zone=payment_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Admin payment routes
        location /api/v1/admin/payments/ {
            limit_req zone=admin_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        location /api/v1/admin/invoices/ {
            limit_req zone=admin_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        location /api/v1/admin/revenue/ {
            limit_req zone=admin_limit burst=3 nodelay;
            limit_req_status 429;

            proxy_pass http://payment-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Notifications service
        location /api/v1/notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://notifications-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Metrics (protected - requires API key or allowed IP)
        location /api/v1/metrics {
            limit_req zone=api_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://main;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Health check
        location /api/v1/health {
            proxy_pass http://main;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # AI Ops dashboard
        location /ops {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://main;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Main API
        location /api/v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://main;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Grafana (restricted to internal network)
        location /grafana/ {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Prometheus (restricted to internal network)
        location /prometheus/ {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Jaeger (restricted to internal network)
        location /jaeger/ {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://jaeger/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Fallback
        location / {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://main;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Correlation-ID $correlation_id;
            proxy_set_header X-Request-ID $request_id;
        }

        # Custom error pages
        error_page 502 @error_502;
        error_page 503 @error_503;
        error_page 504 @error_504;

        location @error_502 {
            default_type application/json;
            return 502 '{"error": "Bad Gateway", "status": 502, "message": "The upstream server is not responding", "timestamp": "$time_iso8601", "request_id": "$request_id", "correlation_id": "$correlation_id"}';
        }

        location @error_503 {
            default_type application/json;
            return 503 '{"error": "Service Unavailable", "status": 503, "message": "The service is temporarily unavailable", "timestamp": "$time_iso8601", "request_id": "$request_id", "correlation_id": "$correlation_id"}';
        }

        location @error_504 {
            default_type application/json;
            return 504 '{"error": "Gateway Timeout", "status": 504, "message": "The upstream server timed out", "timestamp": "$time_iso8601", "request_id": "$request_id", "correlation_id": "$correlation_id"}';
        }
    }
}
