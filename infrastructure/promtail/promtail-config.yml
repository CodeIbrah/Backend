server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: container-logs
          __path__: /var/log/containers/*.log
          service: '{{ index .ContainerLabels "com.docker.compose.service" | default "unknown" }}'
          environment: '{{ index .ContainerLabels "com.environment" | default "production" }}'

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - labels:
          service:
          environment:
          stream:
      - output:
          source: output
