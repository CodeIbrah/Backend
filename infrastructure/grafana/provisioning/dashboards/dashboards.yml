apiVersion: 1

providers:
  - name: 'Backend Template'
    orgId: 1
    folder: 'Backend Template'
    folderUid: 'backend-template'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
